<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Values Incremental</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <h1 style="margin-left: 1%">Values Incremental</h1>

    <div id="app">
        <div class="currency-container">
            <div class="progress-currency">
                <div class="progress-display">
                    You have <b style="text-shadow: 0 0 10px white">{{ format(player.progress, 2) }}</b> progress.
                </div>
            </div>
        </div>
        <div class="producers-container">
            <div class="generators-container">
                <div class="generator virtue-generator" v-for="generator in player.virtues" :key="generator.name">
                    <generator :generator="generator" :player="player"></generator>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/generator.js"></script>
    <script src="js/player.js"></script>
    <script src="js/loop.js"></script>
    <script src="js/format.js"></script>
    <script src="js/components/generator.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
